name: Update Website and Playtime Data

# Three scheduled jobs, intentionally staggered so they don't fight
# over SteamGifts' rate limit at the same time:
#
#   • Every 8h (00 / 08 / 16 UTC)  → website data (giveaways, members
#                                    metadata, game prices, HLTB).
#   • Daily 01:00 UTC               → playtime data (Steam Web API),
#                                    mode=daily, 45-min budget cap.
#                                    Refreshes every win older than 1
#                                    day so stats stay current.
#   • Twice daily 06:00 + 18:00 UTC → group wishlist scrape, isolated
#                                    so it doesn't run alongside the
#                                    giveaway scraper which is the
#                                    other heavy SG endpoint.
#
# Projections (146 users × ~1875 wins, ~1.3 s/win observed locally):
#   • Full daily refresh: ~1700 calls, ≈ 37 min wallclock
#   • Steam quota:        ~1.9% of the 100 k/day per-key limit
#
# The 45-min PLAYTIME_BUDGET_MINUTES cap is a safety net only; if the
# run is interrupted, the priority queue picks up missing/stale items
# first on the next run.
#
# Cron minutes are intentionally staggered OFF the top of the hour. Two reasons:
#   1. GitHub's scheduled-event queue is most congested at minute :00, so runs
#      there are routinely delayed or dropped entirely (this is why the hourly
#      challenge sometimes skipped). Off-peak minutes are far more reliable.
#   2. Distinct minutes mean no two jobs fire in the same minute, so they don't
#      race to push. The rebase-retry loop in each push step is the backstop for
#      the case where a delayed run still overlaps another.
on:
  schedule:
    - cron: '15 0,8,16 * * *'  # website data, every 8 hours
    - cron: '30 1 * * *'       # playtime data, daily
    - cron: '15 6,18 * * *'    # wishlist, twice daily, off-peak
    - cron: '25 * * * *'       # gaming challenge leaderboard, every hour
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: false
        default: 'website'
        type: choice
        options:
          - website
          - wishlist
          - playtime
          - playtime-all
          - challenge

permissions:
  contents: write

jobs:
  website-data:
    if: |
      github.event.schedule == '15 0,8,16 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'website') ||
      github.event_name == 'push'
    runs-on: ubuntu-latest
    # Typical run is ~13 min; cap at 30 so a stuck HLTB/SG fetch can't burn
    # the default 6h runner allowance.
    timeout-minutes: 30
    env:
      STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
      SG_TOKEN: ${{ secrets.SG_TOKEN }}
      SG_COOKIE: ${{ secrets.SG_COOKIE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync branch with latest changes
        run: git pull --rebase origin ${{ github.ref_name }} || true

      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Generate website data (no playtime, no wishlist)
        run: pnpm run data

      - name: Commit and push website data changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add packages/website/public/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Update website data - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            # Another staggered job may have pushed while we ran — rebase onto
            # the latest and retry rather than failing the whole run.
            for attempt in 1 2 3 4 5; do
              if git push origin ${{ github.ref_name }}; then
                echo "Pushed on attempt $attempt"; break
              fi
              if [ "$attempt" = "5" ]; then
                echo "Push still rejected after 5 attempts"; exit 1
              fi
              echo "Push rejected (attempt $attempt) — rebasing on latest and retrying"
              git pull --rebase origin ${{ github.ref_name }}
              sleep 5
            done
          fi

  wishlist:
    if: |
      github.event.schedule == '15 6,18 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'wishlist')
    runs-on: ubuntu-latest
    # ~40 pages × 2.5s + room for 5 retries × up to 480s back-off ≈ 25 min
    # worst-case; cap at 30.
    timeout-minutes: 30
    env:
      SG_TOKEN: ${{ secrets.SG_TOKEN }}
      SG_COOKIE: ${{ secrets.SG_COOKIE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync branch with latest changes
        run: git pull --rebase origin ${{ github.ref_name }} || true

      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Scrape group wishlist
        run: pnpm --filter scraper run wishlist

      - name: Commit and push wishlist changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add packages/website/public/data/wishlist.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "💝 Update wishlist - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            # Another staggered job may have pushed while we ran — rebase onto
            # the latest and retry rather than failing the whole run.
            for attempt in 1 2 3 4 5; do
              if git push origin ${{ github.ref_name }}; then
                echo "Pushed on attempt $attempt"; break
              fi
              if [ "$attempt" = "5" ]; then
                echo "Push still rejected after 5 attempts"; exit 1
              fi
              echo "Push rejected (attempt $attempt) — rebasing on latest and retrying"
              git pull --rebase origin ${{ github.ref_name }}
              sleep 5
            done
          fi

  playtime:
    if: |
      github.event.schedule == '30 1 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.job == 'playtime' || github.event.inputs.job == 'playtime-all'))
    runs-on: ubuntu-latest
    # PLAYTIME_BUDGET_MINUTES=45 is the soft cap (exits cleanly, commits
    # partial progress, defers leftover wins to tomorrow). This 60-min
    # runner timeout is the hard backstop if a fetch() gets stuck and the
    # budget check never gets a chance to run.
    timeout-minutes: 60
    env:
      STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
      SG_TOKEN: ${{ secrets.SG_TOKEN }}
      SG_COOKIE: ${{ secrets.SG_COOKIE }}
      # Safety net: cap a single run so a stalled call can't burn the
      # whole CI hour. Anything still pending rolls into tomorrow's run
      # automatically (priority queue surfaces missing/stale wins first).
      PLAYTIME_BUDGET_MINUTES: '45'
      PLAYTIME_MODE: >-
        ${{
          (github.event.inputs.job == 'playtime-all' && 'all') ||
          'daily'
        }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync branch with latest changes
        run: git pull --rebase origin ${{ github.ref_name }} || true

      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Generate playtime data (${{ env.PLAYTIME_MODE }})
        run: pnpm --filter scraper run playtime

      - name: Commit and push playtime changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add packages/website/public/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🎮 Update playtime data (${{ env.PLAYTIME_MODE }}) - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            # Another staggered job may have pushed while we ran — rebase onto
            # the latest and retry rather than failing the whole run.
            for attempt in 1 2 3 4 5; do
              if git push origin ${{ github.ref_name }}; then
                echo "Pushed on attempt $attempt"; break
              fi
              if [ "$attempt" = "5" ]; then
                echo "Push still rejected after 5 attempts"; exit 1
              fi
              echo "Push rejected (attempt $attempt) — rebasing on latest and retrying"
              git pull --rebase origin ${{ github.ref_name }}
              sleep 5
            done
          fi

  challenge:
    # Refreshes every gaming-challenge leaderboard (Backpack Hero, Kill The
    # Crows, …) in one run. Light (a few hundred Steam calls total), so it can
    # run hourly on its own cron and stay clear of the SteamGifts-heavy jobs.
    if: |
      github.event.schedule == '25 * * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'challenge')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync branch with latest changes
        run: git pull --rebase origin ${{ github.ref_name }} || true

      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Generate gaming challenge leaderboard data
        run: pnpm --filter scraper run challenge

      - name: Commit and push challenge changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add packages/website/public/data/challenge_*.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🏆 Update challenge leaderboard - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            # Another staggered job may have pushed while we ran — rebase onto
            # the latest and retry rather than failing the whole run.
            for attempt in 1 2 3 4 5; do
              if git push origin ${{ github.ref_name }}; then
                echo "Pushed on attempt $attempt"; break
              fi
              if [ "$attempt" = "5" ]; then
                echo "Push still rejected after 5 attempts"; exit 1
              fi
              echo "Push rejected (attempt $attempt) — rebasing on latest and retrying"
              git pull --rebase origin ${{ github.ref_name }}
              sleep 5
            done
          fi
